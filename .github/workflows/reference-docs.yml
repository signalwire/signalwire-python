# API reference docs (pilot).
#
# Builds the SignalWire Python SDK API reference (MkDocs Material + mkdocstrings)
# and publishes a single, unversioned "latest" site to this repo's OWN GitHub Pages:
#   https://signalwire.github.io/signalwire-python/
#
# Triggers on `v*` release tags — each release rebuilds + republishes the site —
# plus workflow_dispatch for manual/fork-preview runs. (Versioning via mike was
# intentionally left out of the pilot; it can be added back later.)
#
# MANUAL REPO SETTING REQUIRED to go live (one-time, in the GitHub UI):
#   Settings -> Pages -> Build and deployment -> Source = "Deploy from a branch"
#   -> Branch = `gh-pages` / `(root)`. `mkdocs gh-deploy` pushes the built site there.
name: reference-docs

env:
  # Match the repo's other workflows (redundant here since this workflow's
  # actions are pinned to v6, which is already Node 24-native).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:        # manual runs (and fork-preview builds)
  push:
    tags:
      - "v*"                # each release rebuilds + republishes the site, alongside publish-release.yml

permissions:
  contents: write   # gh-deploy pushes the built site to the gh-pages branch

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # gh-deploy needs the gh-pages branch history

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install SDK (editable) + doc toolchain
        run: |
          python -m pip install --upgrade pip
          pip install -r reference/requirements.txt
          pip install -e .

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate API pages
        run: bash reference/gen.sh --no-build

      - name: Build + deploy to gh-pages
        run: python3 -m mkdocs gh-deploy --config-file reference/mkdocs.yml --force
