name: Publish Release

env:
  # Opt into Node.js 24 ahead of GitHub's 2026-06-02 default switch.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    tags:
      - 'v*'

jobs:
  # Gate the release: run the full CI gate set (TEST -> SIGNATURES -> DRIFT ->
  # NO-CHEAT) before anything is uploaded to PyPI, so a red tree can't ship.
  # Mirrors test.yml's setup (porting-sdk checkout for the mock harnesses +
  # audit scripts, then `bash scripts/run-ci.sh`).
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - name: Checkout signalwire-python
        uses: actions/checkout@v7
        with:
          path: signalwire-python

      - name: Checkout porting-sdk (mock_relay + mock_signalwire test harnesses + audit scripts)
        uses: actions/checkout@v7
        with:
          repository: signalwire/porting-sdk
          path: porting-sdk
          token: ${{ secrets.PORTING_SDK_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Install Python test harnesses (mock_relay + mock_signalwire)
        run: |
          pip install -e porting-sdk/test_harness/mock_relay
          pip install -e porting-sdk/test_harness/mock_signalwire

      - name: Install griffe (used by porting-sdk's enumerate_python_signatures.py for the SIGNATURES gate)
        run: pip install 'griffe==2.1.0'

      - name: Install signalwire-python (editable + dev deps)
        working-directory: signalwire-python
        run: |
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Run CI gate script (TEST -> SIGNATURES -> DRIFT -> NO-CHEAT)
        working-directory: signalwire-python
        env:
          PORTING_SDK: ${{ github.workspace }}/porting-sdk
        run: bash scripts/run-ci.sh

  publish-release:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi-release
    permissions:
      contents: write  # For creating GitHub releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Get version from tag
        id: tag_version
        run: |
          # Extract version from tag (remove 'v' prefix)
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Tag version: $TAG_VERSION"
          echo "tag_version=$TAG_VERSION" >> $GITHUB_OUTPUT

      - name: Validate version matches pyproject.toml
        run: |
          TAG_VERSION="${{ steps.tag_version.outputs.tag_version }}"
          PYPROJECT_VERSION=$(grep -Po '(?<=^version = ")[^"]*' pyproject.toml)

          echo "Tag version: $TAG_VERSION"
          echo "pyproject.toml version: $PYPROJECT_VERSION"

          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match pyproject.toml version ($PYPROJECT_VERSION)"
            echo "Please ensure the version in pyproject.toml is updated and committed before tagging."
            exit 1
          fi

          echo "Version validation passed!"

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          twine upload dist/*

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.tag_version.outputs.tag_version }}"

          # Extract the changelog section for this version
          # Looks for "## v{version}" or "## {version}" and captures until next "## "
          CHANGELOG=$(awk "/^## .*${VERSION}/,/^## [^${VERSION}]/" CHANGELOG.md | head -n -1)

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="Release v${VERSION}"
          fi

          # Save to file to handle multiline content
          echo "$CHANGELOG" > /tmp/changelog.txt
          echo "Extracted changelog:"
          cat /tmp/changelog.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: v${{ steps.tag_version.outputs.tag_version }}
          body_path: /tmp/changelog.txt
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Release Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.tag_version.outputs.tag_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Install with:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "pip install signalwire-sdk==${{ steps.tag_version.outputs.tag_version }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**PyPI:** https://pypi.org/project/signalwire-sdk/${{ steps.tag_version.outputs.tag_version }}/" >> $GITHUB_STEP_SUMMARY
