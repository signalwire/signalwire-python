name: Publish Dev Release

env:
  # Opt into Node.js 24 ahead of GitHub's 2026-06-02 default switch.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.github/workflows/publish-release.yml'

jobs:
  # Gate the publish: run the full CI gate set (TEST -> SIGNATURES -> DRIFT ->
  # NO-CHEAT) before anything is uploaded to PyPI, so a red tree can't ship.
  # Mirrors test.yml's setup (porting-sdk checkout for the mock harnesses +
  # audit scripts, then `bash scripts/run-ci.sh`).
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - name: Checkout signalwire-python
        uses: actions/checkout@v7
        with:
          path: signalwire-python

      - name: Checkout porting-sdk (mock_relay + mock_signalwire test harnesses + audit scripts)
        uses: actions/checkout@v7
        with:
          repository: signalwire/porting-sdk
          # PINNED to the gate-enforcement plan branch: WIRED-MODES/DOC-SURFACE call
          # porting-sdk scripts (check_wired_modes.py, doc_surface.py) not yet on main,
          # and DRIFT diffs the regenerated 6.6 oracle committed there. REVERT this ref
          # to main when the porting-sdk plan branch merges.
          ref: plan/a-bar-2026-07-18
          path: porting-sdk
          token: ${{ secrets.PORTING_SDK_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Install Python test harnesses (mock_relay + mock_signalwire)
        run: |
          pip install -e porting-sdk/test_harness/mock_relay
          pip install -e porting-sdk/test_harness/mock_signalwire

      - name: Install griffe (used by porting-sdk's enumerate_python_signatures.py for the SIGNATURES gate)
        run: pip install 'griffe==2.1.0'

      - name: Install signalwire-python (editable + dev deps)
        working-directory: signalwire-python
        run: |
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Run CI gate script (TEST -> SIGNATURES -> DRIFT -> NO-CHEAT)
        working-directory: signalwire-python
        env:
          PORTING_SDK: ${{ github.workspace }}/porting-sdk
        run: bash scripts/run-ci.sh

  publish-dev:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi-dev
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Get base version and set dev version
        id: version
        run: |
          # Extract current version from pyproject.toml
          BASE_VERSION=$(grep -Po '(?<=^version = ")[^"]*' pyproject.toml)
          echo "Base version: $BASE_VERSION"

          # Create dev version with run number
          DEV_VERSION="${BASE_VERSION}.dev${{ github.run_number }}"
          echo "Dev version: $DEV_VERSION"
          echo "dev_version=$DEV_VERSION" >> $GITHUB_OUTPUT

      - name: Update version for dev release
        run: |
          DEV_VERSION="${{ steps.version.outputs.dev_version }}"

          # Update pyproject.toml
          sed -i "s/^version = \".*\"/version = \"$DEV_VERSION\"/" pyproject.toml

          # Update __init__.py
          sed -i "s/__version__ = \".*\"/__version__ = \"$DEV_VERSION\"/" signalwire/signalwire/__init__.py

          # Update agent_server.py
          sed -i "s/version=\"[^\"]*\"/version=\"$DEV_VERSION\"/" signalwire/signalwire/agent_server.py

          echo "Updated version to $DEV_VERSION"
          grep "version" pyproject.toml | head -1
          grep "__version__" signalwire/signalwire/__init__.py

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          twine upload dist/*

      - name: Summary
        run: |
          echo "## Dev Release Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.version.outputs.dev_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Install with:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "pip install signalwire-sdk==${{ steps.version.outputs.dev_version }}" >> $GITHUB_STEP_SUMMARY
          echo "# or for latest dev:" >> $GITHUB_STEP_SUMMARY
          echo "pip install signalwire-sdk --pre" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
